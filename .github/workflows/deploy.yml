name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${repo}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner}/${repo}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: ssh-keyscan -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Generate deploy env
        env:
          APP_IMAGE: ${{ steps.meta.outputs.image }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          cat > deploy/.env <<EOF
          APP_IMAGE=${APP_IMAGE}
          APP_DOMAIN=${APP_DOMAIN}
          LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
          DATABASE_URL=${DATABASE_URL}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          GHCR_USERNAME=${GHCR_USERNAME}
          GHCR_TOKEN=${GHCR_TOKEN}
          EOF

      - name: Upload deployment bundle
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$SERVER_DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" deploy/Caddyfile deploy/docker-compose.yml deploy/deploy.sh deploy/.env "$SERVER_USER@$SERVER_HOST:$SERVER_DEPLOY_PATH/"

      - name: Run remote deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" "cd '$SERVER_DEPLOY_PATH' && chmod +x deploy.sh && ./deploy.sh"
